<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Dashboard Planning Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; overflow: hidden; font-family: sans-serif; }
        .sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .calendar-area { flex: 1; padding: 20px; }
        .fc { background: #1e293b; border-radius: 12px; padding: 10px; height: 100% !important; border: 1px solid #334155; color: white; }
        .external-event { background: #334155; padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: grab; border-left: 4px solid #3b82f6; font-size: 0.85rem; }
        .external-event:hover { background: #475569; }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
        .fc-v-event { border: none !important; }
    </style>
</head>
<body>

    <div class="sidebar p-4">
        <h2 class="text-xl font-bold mb-4 text-blue-400 flex items-center gap-2"><span>📋</span> Mes Devoirs</h2>
        <div id="external-events" class="flex-1 overflow-y-auto space-y-2 pr-2">
            </div>
    </div>

    <div class="calendar-area">
        <div id="calendar"></div>
    </div>

    <div id="modal">
        <div class="bg-slate-800 p-6 rounded-xl border border-blue-500 w-96 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-white">Modifier l'élément</h3>
            <label class="text-xs text-gray-400 uppercase font-bold">Nom de la tâche</label>
            <input id="evInput" type="text" class="w-full p-2 mt-1 mb-4 bg-slate-900 border border-slate-700 rounded text-white outline-none focus:border-blue-400">
            
            <div id="typeSelector">
                <label class="text-xs text-gray-400 uppercase font-bold">Type</label>
                <select id="evType" class="w-full p-2 mt-1 mb-4 bg-slate-900 border border-slate-700 rounded text-white">
                    <option value="task">Devoir 📚 (Apparaît à gauche)</option>
                    <option value="event">Perso 🏠 (Calendrier seul)</option>
                </select>
            </div>

            <div class="flex justify-between items-center mt-6">
                <button id="btnDelete" class="text-red-500 hover:text-red-400 text-sm font-bold underline">Supprimer</button>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="text-gray-400 px-4 py-2">Annuler</button>
                    <button id="btnSave" class="bg-blue-600 px-5 py-2 rounded-lg font-bold hover:bg-blue-500 transition">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rwnpkpaupqdzcbdeinte.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_BRjmV607G1s8-PUy1AOWcw_OyxT353N";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let calendar;
        let activeId = null;
        let activeDate = null;

        document.addEventListener('DOMContentLoaded', async function() {
            initSidebar();
            
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridWeek',
                locale: 'fr',
                editable: true,
                droppable: true,
                selectable: true,
                slotMinTime: "07:00:00",
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },

                // Afficher les événements qui ont une date
                events: async function(info, successCallback) {
                    const { data } = await supabaseClient.from('devoirs').select('*').not('due_date', 'is', null);
                    successCallback(data.map(d => ({
                        id: d.id, title: d.titre, start: d.due_date,
                        backgroundColor: d.type === 'event' ? '#8b5cf6' : '#3b82f6'
                    })));
                },

                // GLISSER UN DEVOIR
                drop: async function(info) {
                    const id = info.draggedEl.getAttribute('data-id');
                    await supabaseClient.from('devoirs').update({ 
                        due_date: info.dateStr, 
                        is_placed: true 
                    }).eq('id', id);
                    calendar.refetchEvents();
                },

                // CLIQUER POUR MODIFIER / SUPPRIMER
                eventClick: function(info) {
                    activeId = info.event.id;
                    document.getElementById('modalTitle').innerText = "Modifier";
                    document.getElementById('evInput').value = info.event.title;
                    document.getElementById('typeSelector').classList.add('hidden');
                    document.getElementById('btnDelete').classList.remove('hidden');
                    document.getElementById('modal').style.display = 'flex';
                },

                // CLIQUER VIDE POUR CRÉER
                select: function(info) {
                    activeId = null;
                    activeDate = info.startStr;
                    document.getElementById('modalTitle').innerText = "Nouvelle tâche";
                    document.getElementById('evInput').value = "";
                    document.getElementById('typeSelector').classList.remove('hidden');
                    document.getElementById('btnDelete').classList.add('hidden');
                    document.getElementById('modal').style.display = 'flex';
                }
            });
            calendar.render();
        });

        async function initSidebar() {
            const container = document.getElementById('external-events');
            container.innerHTML = "";
            // On affiche TOUS les devoirs (type 'task') à gauche
            const { data } = await supabaseClient.from('devoirs').select('*').eq('type', 'task');
            data?.forEach(item => {
                const el = document.createElement('div');
                el.className = 'external-event fc-event';
                el.innerText = item.titre;
                el.setAttribute('data-id', item.id);
                container.appendChild(el);
                new FullCalendar.Draggable(el, { eventData: { title: item.titre, id: item.id } });
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        document.getElementById('btnSave').onclick = async function() {
            const val = document.getElementById('evInput').value;
            if (!val) return;

            if (activeId) {
                // UPDATE (Renommer)
                await supabaseClient.from('devoirs').update({ titre: val }).eq('id', activeId);
            } else {
                // INSERT (Nouveau)
                const type = document.getElementById('evType').value;
                await supabaseClient.from('devoirs').insert([{ titre: val, due_date: activeDate, type: type, is_placed: true }]);
            }
            closeModal();
            calendar.refetchEvents();
            initSidebar();
        };

        document.getElementById('btnDelete').onclick = async function() {
            if (confirm("Supprimer cette tâche ?")) {
                await supabaseClient.from('devoirs').delete().eq('id', activeId);
                closeModal();
                calendar.refetchEvents();
                initSidebar();
            }
        };
    </script>
</body>
</html>
