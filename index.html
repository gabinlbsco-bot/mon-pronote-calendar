<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Dashboard Planning Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .calendar-area { flex: 1; padding: 20px; }
        .fc { background: #1e293b; border-radius: 12px; padding: 10px; height: 100% !important; border: 1px solid #334155; }
        .external-event { background: #334155; padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: grab; border-left: 4px solid #3b82f6; font-size: 0.9rem; transition: 0.2s; }
        .external-event:hover { background: #475569; transform: scale(1.02); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="sidebar p-4">
        <h2 class="text-xl font-bold mb-4 text-blue-400">📋 Liste des tâches</h2>
        <div id="external-events" class="flex-1 overflow-y-auto space-y-2">
            </div>
        <div class="mt-4 pt-4 border-t border-slate-700">
            <p class="text-xs text-gray-400 italic mb-2">Les éléments restent ici même après avoir été placés.</p>
        </div>
    </div>

    <div class="calendar-area">
        <div id="calendar"></div>
    </div>

    <div id="modal">
        <div class="bg-slate-800 p-6 rounded-xl border border-blue-500 w-96 shadow-2xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4">Gérer l'élément</h3>
            <input id="evInput" type="text" class="w-full p-2 mb-4 bg-slate-900 border border-slate-700 rounded text-white outline-none focus:border-blue-500">
            
            <div id="typeSelector" class="mb-6">
                <label class="text-xs text-gray-400">Type :</label>
                <select id="evType" class="w-full p-2 bg-slate-900 border border-slate-700 rounded text-white mt-1">
                    <option value="task">Devoir 📚</option>
                    <option value="event">Perso 🏠</option>
                </select>
            </div>

            <div class="flex justify-between items-center mt-6">
                <button id="btnDelete" class="bg-red-600/20 text-red-500 px-4 py-2 rounded hover:bg-red-600 hover:text-white transition">Supprimer</button>
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="text-gray-400 px-4">Annuler</button>
                    <button id="btnSave" class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-500">Valider</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://rwnpkpaupqdzcbdeinte.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_BRjmV607G1s8-PUy1AOWcw_OyxT353N";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let calendar;
        let activeEventId = null;
        let activeDateInfo = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const calendarEl = document.getElementById('calendar');
            initSidebar();

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'fr',
                editable: true,
                droppable: true,
                selectable: true,
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },

                // Charger depuis Supabase (table devoirs)
                events: async function(info, successCallback) {
                    const { data } = await supabase.from('devoirs').select('*').not('due_date', 'is', null);
                    successCallback(data.map(d => ({
                        id: d.id, title: d.titre, start: d.due_date,
                        backgroundColor: d.type === 'event' ? '#8b5cf6' : '#3b82f6',
                        borderColor: 'transparent'
                    })));
                },

                // Cliquer sur un événement pour RENOMMER ou SUPPRIMER
                eventClick: function(info) {
                    activeEventId = info.event.id;
                    document.getElementById('modalTitle').innerText = "Modifier l'élément";
                    document.getElementById('evInput').value = info.event.title;
                    document.getElementById('typeSelector').style.display = "none";
                    document.getElementById('btnDelete').style.display = "block";
                    document.getElementById('modal').style.display = 'flex';
                },

                // Sélectionner une case vide pour CRÉER manuellement
                select: function(info) {
                    activeEventId = null;
                    activeDateInfo = info;
                    document.getElementById('modalTitle').innerText = "Nouvelle tâche";
                    document.getElementById('evInput').value = "";
                    document.getElementById('typeSelector').style.display = "block";
                    document.getElementById('btnDelete').style.display = "none";
                    document.getElementById('modal').style.display = 'flex';
                },

                // Quand on glisse un élément de la gauche
                drop: async function(info) {
                    const id = info.draggedEl.getAttribute('data-id');
                    await supabase.from('devoirs').update({ 
                        due_date: info.dateStr, 
                        is_placed: true 
                    }).eq('id', id);
                    calendar.refetchEvents();
                }
            });
            calendar.render();
        });

        // Charger la sidebar
        async function initSidebar() {
            const container = document.getElementById('external-events');
            container.innerHTML = "";
            const { data } = await supabase.from('devoirs').select('*');
            if (data) {
                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'external-event fc-event';
                    el.innerText = item.titre;
                    el.setAttribute('data-id', item.id);
                    container.appendChild(el);
                    new FullCalendar.Draggable(el, { eventData: { title: item.titre, id: item.id } });
                });
            }
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Action du bouton VALIDER (Créer ou Renommer)
        document.getElementById('btnSave').onclick = async function() {
            const newTitle = document.getElementById('evInput').value;
            const type = document.getElementById('evType').value;

            if (activeEventId) {
                // MODE RENOMMER
                await supabase.from('devoirs').update({ titre: newTitle }).eq('id', activeEventId);
            } else {
                // MODE CRÉER MANUEL
                await supabase.from('devoirs').insert([{
                    titre: newTitle, due_date: activeDateInfo.startStr, type: type, is_placed: true
                }]);
            }
            closeModal();
            calendar.refetchEvents();
            initSidebar(); // On recharge la barre de gauche pour voir la nouvelle tâche
        };

        // Action du bouton SUPPRIMER
        document.getElementById('btnDelete').onclick = async function() {
            if (confirm("Supprimer définitivement ?")) {
                await supabase.from('devoirs').delete().eq('id', activeEventId);
                closeModal();
                calendar.refetchEvents();
                initSidebar();
            }
        };
    </script>
</body>
</html>
